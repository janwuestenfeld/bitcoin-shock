name: Daily data refresh

on:
  schedule:
    # 03:00 UTC daily = 23:00 ET, well after NYSE close + BTC daily close at 00:00 UTC.
    # FRED daily series are typically posted by 22:00 UTC (varies by series).
    - cron: '0 3 * * *'
  workflow_dispatch: {}  # also allow manual trigger from the Actions tab

permissions:
  contents: write  # need to commit data updates back to the repo

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run refresh
        run: python src/refresh_data.py

      - name: Commit and push updates
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/ output/
          if git diff --staged --quiet; then
            echo "No changes — nothing to commit"
          else
            git commit -m "data: $(date -u +%Y-%m-%d) auto-refresh"
            git push
          fi
